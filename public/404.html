<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Fantasy Football Union</title>
    <!-- GitHub Pages serves this for unknown paths. We're at a custom-domain root with
         BrowserRouter, so encode the path into a query and bounce to index.html, which
         decodes it back. pathSegmentsToKeep = 0 (no project-page subpath).
         https://github.com/rafgraph/spa-github-pages -->
    <script>
      (function () {
        var pathSegmentsToKeep = 0
        var l = window.location
        l.replace(
          l.protocol +
            '//' +
            l.hostname +
            (l.port ? ':' + l.port : '') +
            l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') +
            '/?/' +
            l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
            (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
            l.hash,
        )
      })()
    </script>
  </head>
  <body></body>
</html>
