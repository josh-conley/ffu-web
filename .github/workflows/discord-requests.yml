name: Discord site requests

# Autonomous "commissioner asks in Discord → I open a PR" pipeline. Polls a Discord channel for an
# unhandled request, implements it with Claude Code, runs the gates, opens a PR (never auto-merges),
# and reports back in Discord (✅ + PR link, or ❌ + reason). Inert until the secrets/vars below exist.
#
# Required repo SECRETS:  DISCORD_BOT_TOKEN, CLAUDE_CODE_OAUTH_TOKEN  (Pro/Max subscription token)
# Required repo VARIABLES: DISCORD_CHANNEL_ID, DISCORD_COMMISSIONER_ID
# See automation/discord-requests/README.md for bot setup (intents/permissions).

on:
  schedule:
    - cron: '*/15 * * * *' # every 15 min (GitHub may delay scheduled runs under load)
  workflow_dispatch: {} # run manually to test

# One at a time. A request is also claimed via a 👀 reaction, but this is belt + suspenders.
concurrency:
  group: discord-requests
  cancel-in-progress: false

permissions:
  contents: write # push the auto/* branch
  pull-requests: write # open the PR

jobs:
  process:
    # Skip (don't fail) until configured — set DISCORD_CHANNEL_ID to turn the pipeline on.
    if: ${{ vars.DISCORD_CHANNEL_ID != '' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # 1) Claim the next unhandled request (reacts 👀, writes request.txt). Only this step sees the
      #    Discord token.
      - id: req
        env:
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          DISCORD_CHANNEL_ID: ${{ vars.DISCORD_CHANNEL_ID }}
          DISCORD_COMMISSIONER_ID: ${{ vars.DISCORD_COMMISSIONER_ID }}
        run: node automation/discord-requests/discord.mjs next

      - name: Branch + install
        if: steps.req.outputs.has_request == 'true'
        id: branch
        run: |
          git config user.name "ffu-bot"
          git config user.email "ffu-bot@users.noreply.github.com"
          git checkout -b "auto/req-${{ steps.req.outputs.message_id }}"
          echo "base_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          npm ci

      # 2) Implement with Claude Code, authed with the Pro/Max SUBSCRIPTION token (not pay-per-use
      #    API billing). This step ONLY gets that token — NOT the Discord or GitHub tokens — so a
      #    prompt-injected request can't exfiltrate those creds.
      - name: Implement with Claude Code
        if: steps.req.outputs.has_request == 'true'
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          npm install -g @anthropic-ai/claude-code
          {
            echo "You are working in the FFU web repository as an autonomous agent."
            echo "Read CLAUDE.md and follow the Engineering Charter strictly."
            echo "Implement the following request from the league commissioner. Then run the gates"
            echo "(npm run typecheck, npm run lint, npm test) and fix until ALL are green. Commit the"
            echo "change with a clear message. Do NOT push and do NOT open a PR."
            echo "If the request is ambiguous, unsafe, or you cannot complete it well, make NO changes"
            echo "and write a one-paragraph reason to a file named BLOCKED.txt instead."
            echo ""
            echo "--- REQUEST ---"
            cat request.txt
          } > prompt.txt
          claude -p "$(cat prompt.txt)" --dangerously-skip-permissions

      # 3) Decide the outcome. Blocked or no-op → fail (the report step picks up the reason).
      - name: Verify result
        if: steps.req.outputs.has_request == 'true'
        run: |
          if [ -f BLOCKED.txt ]; then echo "Request was blocked:"; cat BLOCKED.txt; exit 1; fi
          if [ "$(git rev-parse HEAD)" = "${{ steps.branch.outputs.base_sha }}" ]; then
            echo "No changes were committed." > BLOCKED.txt
            exit 1
          fi

      # 4) Hard gate — never open a red PR (Claude should already be green; this is defense).
      - name: Gates
        if: steps.req.outputs.has_request == 'true'
        run: |
          npm run typecheck
          npm run lint
          npm test

      # 5) Push the branch + open the PR. Only this step sees the GitHub token.
      - name: Open PR
        if: steps.req.outputs.has_request == 'true'
        id: pr
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          BRANCH="auto/req-${{ steps.req.outputs.message_id }}"
          git push origin "$BRANCH"
          TITLE="$(head -1 request.txt | cut -c1-70)"
          BODY="$(printf 'Automated change from a Discord site request (message %s).\n\n--- request ---\n%s\n\n🤖 Generated by the autonomous request pipeline — review before merging.' '${{ steps.req.outputs.message_id }}' "$(cat request.txt)")"
          PR_URL="$(gh pr create --base main --head "$BRANCH" --title "Auto: ${TITLE:-site request}" --body "$BODY")"
          echo "pr_url=$PR_URL" >> "$GITHUB_OUTPUT"

      # 6a) Success → ✅ + PR link in Discord.
      - name: Report success
        if: steps.req.outputs.has_request == 'true'
        env:
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          DISCORD_CHANNEL_ID: ${{ vars.DISCORD_CHANNEL_ID }}
        run: node automation/discord-requests/discord.mjs done "${{ steps.req.outputs.message_id }}" "${{ steps.pr.outputs.pr_url }}"

      # 6b) Failure → ❌ + reason in Discord.
      - name: Report failure
        if: failure() && steps.req.outputs.has_request == 'true'
        env:
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          DISCORD_CHANNEL_ID: ${{ vars.DISCORD_CHANNEL_ID }}
        run: |
          REASON="$(cat BLOCKED.txt 2>/dev/null || echo 'Something went wrong while implementing this — see the GitHub Actions run.')"
          node automation/discord-requests/discord.mjs fail "${{ steps.req.outputs.message_id }}" "$REASON"
