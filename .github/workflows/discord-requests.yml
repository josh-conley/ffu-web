name: Discord site requests

# Autonomous "commissioner asks in Discord → I open a PR" pipeline. Polls a Discord channel for an
# unhandled request, implements it with Claude Code, runs the gates, opens a PR (never auto-merges),
# and reports back in Discord (✅ + PR link, or ❌ + reason). Inert until the secrets/vars below exist.
#
# Required repo SECRETS:  DISCORD_BOT_TOKEN, CLAUDE_CODE_OAUTH_TOKEN  (Pro/Max subscription token)
# Required repo VARIABLES: DISCORD_CHANNEL_ID, DISCORD_COMMISSIONER_ID
# See automation/discord-requests/README.md for bot setup (intents/permissions).

on:
  schedule:
    # Every ~15 min, but on ODD minutes — GitHub deprioritizes/drops crons on the congested round
    # minutes (:00/:15/:30/:45), so :07/:22/:37/:52 fire far more reliably. (Cron is still best-effort
    # and can lag several minutes.)
    - cron: '7,22,37,52 * * * *'
  workflow_dispatch: {} # run manually to test

# One at a time. A request is also claimed via a 👀 reaction, but this is belt + suspenders.
concurrency:
  group: discord-requests
  cancel-in-progress: false

permissions:
  contents: write # push the auto/* branch
  pull-requests: write # open the PR

# Tunable guardrails — dial these as you learn the commissioner's usage:
#   MAX_TURNS    hard cap on agent steps per request (stops a runaway; ~simple 5-12, medium 15-35)
#   CLAUDE_MODEL sonnet = lighter on the Pro allotment + plenty for site tweaks (vs opus)
env:
  MAX_TURNS: '40'
  CLAUDE_MODEL: sonnet

jobs:
  process:
    # Skip (don't fail) until configured — set DISCORD_CHANNEL_ID to turn the pipeline on.
    if: ${{ vars.DISCORD_CHANNEL_ID != '' }}
    runs-on: ubuntu-latest
    timeout-minutes: 12 # wall-clock backstop
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # 1) Claim the next unhandled request (reacts 👀, writes request.txt). Only this step sees the
      #    Discord token.
      - id: req
        env:
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          DISCORD_CHANNEL_ID: ${{ vars.DISCORD_CHANNEL_ID }}
          DISCORD_COMMISSIONER_ID: ${{ vars.DISCORD_COMMISSIONER_ID }}
        run: node automation/discord-requests/discord.mjs next

      # Build on the rolling `auto/requests` branch so the day's requests accumulate (no inter-request
      # conflicts): continue it if it has un-merged work, else start fresh from main (e.g. after a merge).
      - name: Roll onto requests branch + install
        if: steps.req.outputs.has_request == 'true'
        id: branch
        run: |
          git config user.name "ffu-bot"
          git config user.email "ffu-bot@users.noreply.github.com"
          git fetch origin '+refs/heads/*:refs/remotes/origin/*' --quiet
          if git rev-parse --verify --quiet origin/auto/requests >/dev/null \
             && [ "$(git rev-list --count origin/main..origin/auto/requests)" -gt 0 ]; then
            echo "Continuing the open requests branch."
            git checkout -B auto/requests origin/auto/requests
          else
            echo "Starting a fresh requests branch from main."
            git checkout -B auto/requests origin/main
          fi
          echo "base_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          npm ci

      # 2) Implement with Claude Code, authed with the Pro/Max SUBSCRIPTION token (not pay-per-use
      #    API billing). This step ONLY gets that token — NOT the Discord or GitHub tokens — so a
      #    prompt-injected request can't exfiltrate those creds.
      - name: Implement with Claude Code
        if: steps.req.outputs.has_request == 'true'
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          npm install -g @anthropic-ai/claude-code
          {
            echo "You are working in the FFU web repository as an autonomous agent."
            echo "Read CLAUDE.md and follow the Engineering Charter strictly."
            echo ""
            echo "SCOPE: this is an automated ad-hoc request channel for SMALL changes. First assess"
            echo "scope. If the request is large or multi-feature (roughly: a whole new page/feature,"
            echo "or more than a handful of files), do NOT implement it — write a one-paragraph note to"
            echo "a file named BLOCKED.txt saying it's too large for an automated request and should be"
            echo "done manually, then STOP. Keep changes focused and minimal."
            echo ""
            echo "Otherwise: implement the request, then run the gates (npm run typecheck, npm run lint,"
            echo "npm test) and fix until ALL are green. Commit with a clear message. Do NOT push and do"
            echo "NOT open a PR. If the request is ambiguous or unsafe, make NO changes and write the"
            echo "reason to BLOCKED.txt instead."
            echo ""
            echo "--- REQUEST ---"
            cat request.txt
          } > prompt.txt
          claude -p "$(cat prompt.txt)" --model "$CLAUDE_MODEL" --max-turns "$MAX_TURNS" --dangerously-skip-permissions

      # 3) Decide the outcome. Blocked or no-op → fail (the report step picks up the reason).
      - name: Verify result
        if: steps.req.outputs.has_request == 'true'
        run: |
          if [ -f BLOCKED.txt ]; then echo "Request was blocked:"; cat BLOCKED.txt; exit 1; fi
          if [ "$(git rev-parse HEAD)" = "${{ steps.branch.outputs.base_sha }}" ]; then
            echo "No changes were committed." > BLOCKED.txt
            exit 1
          fi

      # 4) Hard gate — never open a red PR (Claude should already be green; this is defense).
      - name: Gates
        if: steps.req.outputs.has_request == 'true'
        run: |
          npm run typecheck
          npm run lint
          npm test

      # 5) Push onto the rolling branch + ensure ONE open PR (create it, or refresh its body). The
      #    day's requests stack as separate commits on this single PR — review once, merge once; the
      #    branch then resets to main. Only this step sees the GitHub token.
      - name: Push + update rolling PR
        if: steps.req.outputs.has_request == 'true'
        id: pr
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git push origin auto/requests
          BODY="$(printf 'Rolling PR of automated Discord requests — each commit below is one request. Review and merge to deploy; the branch resets after merge.\n\n%s\n\n🤖 autonomous request pipeline' "$(git log origin/main..auto/requests --format='- %s (`%h`)')")"
          PR_URL="$(gh pr list --head auto/requests --state open --json url --jq '.[0].url // empty')"
          if [ -z "$PR_URL" ]; then
            PR_URL="$(gh pr create --base main --head auto/requests --title 'Auto: site requests (rolling)' --body "$BODY")"
          else
            gh pr edit "$PR_URL" --body "$BODY"
          fi
          echo "pr_url=$PR_URL" >> "$GITHUB_OUTPUT"

      # 6a) Success → ✅ + PR link (+ live preview link if PREVIEW_URL is configured) in Discord.
      - name: Report success
        if: steps.req.outputs.has_request == 'true'
        env:
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          DISCORD_CHANNEL_ID: ${{ vars.DISCORD_CHANNEL_ID }}
        run: node automation/discord-requests/discord.mjs done "${{ steps.req.outputs.message_id }}" "${{ steps.pr.outputs.pr_url }}" "${{ vars.PREVIEW_URL }}"

      # 6b) Failure → ❌ + reason in Discord.
      - name: Report failure
        if: failure() && steps.req.outputs.has_request == 'true'
        env:
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          DISCORD_CHANNEL_ID: ${{ vars.DISCORD_CHANNEL_ID }}
        run: |
          REASON="$(cat BLOCKED.txt 2>/dev/null || echo 'Something went wrong while implementing this — see the GitHub Actions run.')"
          node automation/discord-requests/discord.mjs fail "${{ steps.req.outputs.message_id }}" "$REASON"
