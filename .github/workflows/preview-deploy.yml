name: Deploy preview on push

# Keeps preview.ffunion.com in sync with ANY push to the rolling auto/requests branch — not just
# Discord-pipeline runs (which deploy themselves inside discord-requests.yml). Manual pushes to the
# preview branch previously deployed nothing. The double deploy after a pipeline push is harmless
# (idempotent upload, ~1 min of runner time).

on:
  push:
    branches: [auto/requests]
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: preview-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Build
        run: |
          npm ci
          npm run build

      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler@4 pages deploy dist --project-name ffu-web-preview --branch auto/requests --commit-dirty=true
